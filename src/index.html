<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- 告知浏览器首选竖屏，不强制锁定（部分 WebView 支持） -->
  <meta name="screen-orientation" content="portrait">
  <title>让礼泡泡吃到饱</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }

    #game {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      position: relative;
      overflow: hidden;
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
    }

    .info {
      position: absolute;
      top: 12px;
      width: 100%;
      display: flex;
      justify-content: space-around;
      color: #fff;
      font-size: 27.5px;
      z-index: 10;
      text-shadow: 0 0 4px #000;
    }

    #paddle {
      position: absolute;
      bottom: 30px;
      width: 200px;
      height: 135px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      pointer-events: none;
    }

    .item {
      position: absolute;
      height: 100px;
      width: 100px;
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
      pointer-events: none;
      transition: none !important;
    }

    .pop {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      z-index: 99;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
      padding: 20px;
      gap: 12px;
    }

    .pop-cover {
      width: 220px;
      height: auto;
      margin-bottom: 16px;
    }

    .end-img {
      width: 240px;
      height: auto;
    }

    .pop h2 {
      font-size: 42.5px;
      margin-bottom: 10px
    }

    .pop p {
      font-size: 11.25px;
      line-height: 1.6
    }

    .pop .score-text {
      font-size: 22.5px;
      font-weight: bold;
    }

    .count-board {
      border: 2px solid #aaa;
      padding: 6px 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
    }

    .count-board p {
      font-size: 10px;
      margin: 2px 0;
    }

    .btn {
      padding: 14px 42px;
      font-size: 12.5px;
      border: none;
      border-radius: 999px;
      background: #00adb5;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:active {
      background: #00868b
    }

    .btn:disabled {
      background: #666;
      cursor: not-allowed
    }

    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.2)
    }

    .btn-secondary:active {
      background: rgba(255, 255, 255, 0.35)
    }

    .hide {
      display: none !important
    }

    #pauseBtn {
      position: absolute;
      top: 50px;
      right: 12px;
      z-index: 20;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: rgba(0, 0, 0, .45);
      color: #fff;
      font-size: 22px;
      line-height: 44px;
      text-align: center;
      cursor: pointer;
      display: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    @media (orientation: landscape) {
      #pauseBtn {
        top: 12px;
      }
    }

    #pauseMask {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 15;
      gap: 18px;
    }

    #pauseMask.hide {
      display: none !important;
    }

    #pauseMask p {
      color: #fff;
      font-size: 32px;
      font-weight: bold;
      text-shadow: 0 2px 8px #000;
    }

    #loadingMask {
      position: fixed;
      inset: 0;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-size: 15px;
      z-index: 9999;
    }

    #loadingBar {
      width: 60%;
      max-width: 260px;
      height: 8px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
    }

    #loadingFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00c6d7, #00e4c0);
      border-radius: 4px;
      transition: width 0.15s ease;
    }

    #loadingTip {
      font-size: 13px;
      color: #aaa;
      letter-spacing: 0.5px;
    }

    .pop-scroll {
      justify-content: center;
      overflow: hidden;
      padding: 10px 12px;
      gap: 8px;
    }

    #endingsPop h2 {
      font-size: 28px;
      margin-bottom: 0;
    }

    #endingsPop .btn {
      padding: 10px 28px;
      font-size: 11px;
      flex-shrink: 0;
    }

    .endings-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      width: 100%;
      max-width: 480px;
      overflow: visible;
      flex-shrink: 1;
      min-height: 0;
    }

    .ending-card {
      border: 1px solid #aaa;
      border-radius: 6px;
      padding: 4px;
      background: rgba(255, 255, 255, 0.08);
    }

    .ending-card img {
      width: 100%;
      height: 11vh;
      max-height: 68px;
      object-fit: cover;
      border-radius: 4px;
      display: block;
    }

    .ending-card.locked {
      border-color: #555;
      background: rgba(255, 255, 255, 0.03);
    }

    .ending-card.locked img {
      filter: grayscale(1) brightness(0.35);
      opacity: 0.75;
    }

    .ending-name {
      font-size: 8px;
      margin-top: 3px;
      line-height: 1.2
    }

    .ending-count {
      font-size: 7px;
      color: #7fd;
      margin-top: 1px;
      line-height: 1.2
    }

    .ending-lock {
      font-size: 7px;
      color: #888;
      margin-top: 1px;
      line-height: 1.2
    }
    #version-badge {
      position: fixed;
      right: 8px;
      bottom: 6px;
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      z-index: 99999;
      pointer-events: none;
      letter-spacing: 0.3px;
    }
  </style>
</head>

<body>
  <div id="version-badge"></div>
  <div id="rotate-wrapper">
    <div id="loadingMask">
      <div id="loadingTip">资源加载中… <span id="loadingPct">0%</span></div>
      <div id="loadingBar">
        <div id="loadingFill"></div>
      </div>
    </div>
    <div id="game">
      <div class="info">
        <div>分数：<span id="score">0</span></div>
        <div>连击：<span id="comboDisplay">0</span>x <span id="multDisplay">1.0</span></div>
        <div>生命：<span id="life">3</span></div>
      </div>
      <div id="paddle"></div>

      <!-- 开始弹窗 -->
      <div id="startPop" class="pop hide">
        <img class="pop-cover" id="startCoverImg" alt="封面">
        <h2>让礼泡泡吃到饱</h2>
        <p>移动礼泡泡接住食物<br>小笼包1分｜瓜咪2分｜虾咪3分｜龙秘宝5分<br>躲开正在吃小笼包的龙秘宝，食物漏掉会清空连击，生命归零游戏结束</p>
        <div class="count-board" id="saveStatsBoard">
          <p><strong>累计记录</strong></p>
          <p>结局收集：<span id="saveEndingsTotal">0</span> / 12</p>
          <p>龙秘宝 <span id="saveBomb">0</span>｜冰块 <span id="saveIce">0</span>｜小龙 <span id="saveXiaolong">0</span></p>
          <p>死鬼 <span id="saveGhost">0</span>｜食物 <span id="saveFood">0</span></p>
        </div>
        <div class="btn-row">
          <button class="btn" id="startBtn">开始游戏</button>
          <button class="btn btn-secondary" id="endingsBtn">结局收集</button>
        </div>
      </div>
      <!-- 结局图鉴 -->
      <div id="endingsPop" class="pop pop-scroll hide">
        <h2>结局图鉴</h2>
        <div id="endingsGrid" class="endings-grid"></div>
        <button class="btn btn-secondary" id="endingsBackBtn">返回</button>
      </div>
      <!-- 结束弹窗 -->
      <div id="overPop" class="pop hide">
        <img class="end-img" id="resultImg" alt="结局图">
        <h2>游戏结束</h2>
        <p class="score-text">最终得分：<span id="finalScore">0</span></p>
        <div class="count-board" id="countBoard">
          <p>正在吃小笼包的龙秘宝：<span id="cntBomb">0</span> 个</p>
          <p>冷冻小笼包：<span id="cntIce">0</span> 个</p>
          <p>区区小龙：<span id="cntXiaolong">0</span> 个</p>
          <p>死鬼：<span id="cntGhost">0</span> 个</p>
          <p>食物：<span id="cntFood">0</span> 个</p>
        </div>
        <div class="btn-row">
          <button class="btn" id="restartBtn">重新开始</button>
          <button class="btn btn-secondary" id="homeBtn">返回主页</button>
        </div>
      </div>
      <button id="pauseBtn">&#9646;&#9646;</button>
      <div id="pauseMask" class="hide">
        <p>游戏暂停</p>
        <button class="btn" id="resumeBtn">继续游戏</button>
      </div>
    </div>
  </div><!-- /rotate-wrapper -->

  <script type="module" src="./main.js"></script>
</body>

</html>
