<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{overflow:hidden; touch-action: none; height:100%;}
#game{
    width:100vw;
    height:100vh;
    height:100dvh;
    position:relative;
    overflow:hidden;
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
}
.info{
    position:absolute;
    top:12px;
    width:100%;
    display:flex;
    justify-content:space-around;
    align-items:center;
    color:#fff;
    font-size:27.5px; /* 原13.75px ×2 放大两倍 */

    text-shadow: 0 0 4px #000;
}
#passiveBuffWrap{
    font-size:18px;
    color:#7fd;
    white-space:nowrap;
}
#paddle{
    position:absolute;
    bottom:30px;
    width:200px;
    height:135px;
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;
    pointer-events: none;
}
.item{
    position:absolute;
	height:100px;
    width:100px;
    background-size: 100% 100%; 
    background-repeat:no-repeat;
    background-position:center;
    pointer-events: none;
	transition: none !important;
    transform-origin: center center;
}
.item.sucking{z-index:5}
.pop{
    position:absolute;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.75);
    z-index:99;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:#fff;
    text-align:center;
    padding:20px;
    gap:12px;
}
.pop-cover{
    width: 220px;
    height: auto;
    margin-bottom:16px;
}
.end-img{
    width: 240px;
    height: auto;
}
/* 弹窗大标题放大2倍 21.25*2=42.5px */
.pop h2{font-size:42.5px;margin-bottom:10px}
.pop p{font-size:11.25px;line-height:1.6} /*9*1.25*/
/* 最终得分文字单独放大2倍 */
.pop .score-text{
    font-size:22.5px;
    font-weight:bold;
}
/* 结算面板样式 整体缩小0.5倍 */
.count-board{
    border: 2px solid #aaa;
    padding:6px 12px;
    border-radius:10px;
    background:rgba(255,255,255,0.1);
}
.count-board p{
    font-size:10px; /*8*1.25*/
    margin:2px 0;
}
.btn{
    padding:14px 42px;
    font-size:12.5px; /*10*1.25*/

    border-radius:999px;
    background:#00adb5;
    color:#fff;
    cursor:pointer;
    transition: background 0.2s;
}
.btn:active{background:#00868b}
.btn:disabled{background:#666;cursor:not-allowed}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn-secondary{background:rgba(255,255,255,0.2)}
.btn-secondary:active{background:rgba(255,255,255,0.35)}
.hide{display:none !important}
#pauseBtn{position:absolute;top:12px;right:12px;z-index:20;width:44px;height:44px;
  border:none;border-radius:50%;background:rgba(0,0,0,.45);color:#fff;
  font-size:22px;line-height:44px;text-align:center;cursor:pointer;
  display:none;-webkit-tap-highlight-color:transparent;user-select:none;}
#pauseMask{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;
  flex-direction:column;align-items:center;justify-content:center;z-index:15;gap:18px;}
#pauseMask.hide{display:none !important;}
#pauseMask p{color:#fff;font-size:32px;font-weight:bold;text-shadow:0 2px 8px #000;}
/* 新增加载遮罩 */
#loadingMask {
    position: fixed;
    inset: 0;
    background: #111;
    color: #fff;
    display: flex;

#loadingFill {

<script>
// ===================== 素材配置区=====================
const IMG = {
    gameBg: "images/bg.png",

    // 托盘图片
    paddle: "images/lipao.png",
    paddleGoodFlash: "images/lipao_good.png",

    paddleIceFlash: "images/lipao_ice.png",
    paddleXiaolongFlash: "images/lipao_xiaolong.png",
    paddleGhostFlash: "images/lipao_ghost.png", // 接住死鬼托盘图
    // 掉落物品
    bomb: "images/bomb.png",
    ice: "images/ice.png",
    xiaolong: "images/xiaolong.png",
    ghost: "images/ghost.png", // 死鬼掉落物图片
    // 加分食物
    goodsList: [
        { img: "images/xiaolongbao.png", point: 1 },
        { img: "images/xigua.png", point: 2 },
        { img: "images/zhaxia.png", point: 3 },
        { img: "images/longmibao.png", point: 5 }
    ],
    // 结局图片
    endZero: "images/endZero.png",
    end142: "images/end142.png",
    end234: "images/end234.png",
    end325: "images/end325.png",
    endQuqu: "images/endQuqu.png",
    endFreeze: "images/endFreeze.png",
    endSacred: "images/endSacred.png",
    endDragonBall: "images/endDragonBall.png", // 分数7 区龙珠结局
    end5835: "images/end5835.png", // 分数5835专属结局
    endHigh: "images/endHigh.png",
    endFull: "images/endFull.png",
    endLow: "images/endLow.png",
    zhaxiaSkill: "images/我是炸虾.png",
    freezeSkill: "images/全部冻上.png",
};
// 音频资源配置【新增炸弹、区区小龙音效】
const AUDIO = {
    bgm: "audio/bgm.mp3",     // 循环背景音乐
    eat: "audio/eat.mp3",     // 吃到食物音效
    ghost: "audio/ghost.mp3", // 接住死鬼音效
    bombBad: "audio/bomb_bad.mp3", // 碰到炸弹音效（单次播放）
    xiaolongSong: "audio/xiaolong.mp3" // 碰到区区小龙音效（单次播放）
};
// ===================================================================



// ===== EMBEDDED ASSETS (base64) ===== HERE 



//存档参数
const SAVE_KEY = 'lipaoStats_v1';

const DEFAULT_SAVE = {
  version: 1,
  endings: {
    end5835: 0, endFull: 0, endFreeze: 0, endSacred: 0,
    endDragonBall: 0, endQuqu: 0, end325: 0, endZero: 0,
    end142: 0, end234: 0, endHigh: 0, endLow: 0
  },
  catches: { bomb: 0, ice: 0, xiaolong: 0, ghost: 0, food: 0 },
  skills: { active: null, passive: null }
};

const SKILL_CATALOG = {
  bigbelly: {
    id: 'bigbelly', slot: 'active', name: '大胃瓜咪',
    defaultUnlocked: true, icon: () => IMG.endHigh,
    desc: '立刻吃掉场上所有食物'
  },
  skill142: {
    id: 'skill142', slot: 'active', name: '142',
    unlockEnding: 'end142', icon: () => IMG.end142,
    desc: '当前页面冰块全部变成小笼包'
  },
  zhaxiaPass: {
    id: 'zhaxiaPass', slot: 'passive', name: '炸虾瓜咪',
    defaultUnlocked: true, icon: () => IMG.zhaxiaSkill,
    desc: '场上所有食物变成炸虾（拾取掉落物触发）'
  },
  freeze: {
    id: 'freeze', slot: 'passive', name: '结冰',
    unlockEnding: 'endFreeze', icon: () => IMG.freezeSkill,
    desc: '物品移速减半（拾取掉落物触发）'
  }
};

const ENDING_LIST = [
  { id: 'end5835', name: '5835分专属' },
  { id: 'endFull', name: '999分以上' },
  { id: 'endFreeze', name: '冷冻结局' },
  { id: 'endSacred', name: '神圣结局' },
  { id: 'endDragonBall', name: '七龙珠' },
  { id: 'endQuqu', name: '区区结局' },
  { id: 'end325', name: '325分' },
  { id: 'endZero', name: '零分' },
  { id: 'end142', name: '142分' },
  { id: 'end234', name: '234分' },
  { id: 'endHigh', name: '高分结局' },
  { id: 'endLow', name: '普通结局' }
];



// DOM缓存
const gameWrap = document.getElementById("game");
const paddle = document.getElementById("paddle");
const scoreBox = document.getElementById("score");
const lifeBox = document.getElementById("life");
const startPop = document.getElementById("startPop");
const overPop = document.getElementById("overPop");
const endingsPop = document.getElementById("endingsPop");
const skillsPop = document.getElementById("skillsPop");
const finalScore = document.getElementById("finalScore");
const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");
const homeBtn = document.getElementById("homeBtn");
const endingsBtn = document.getElementById("endingsBtn");
const endingsBackBtn = document.getElementById("endingsBackBtn");
const skillsPopTitle = document.getElementById("skillsPopTitle");
const skillsList = document.getElementById("skillsList");
const skillsBackBtn = document.getElementById("skillsBackBtn");
const activeSkillSlot = document.getElementById("activeSkillSlot");
const passiveSkillSlot = document.getElementById("passiveSkillSlot");
const activeSkillIcon = document.getElementById("activeSkillIcon");
const passiveSkillIcon = document.getElementById("passiveSkillIcon");
const activeSkillBtn = document.getElementById("activeSkillBtn");
const startCoverImg = document.getElementById("startCoverImg");
const resultImg = document.getElementById("resultImg");
const loadingMask = document.getElementById("loadingMask");
// 结算面板DOM
const cntBomb = document.getElementById("cntBomb");
const cntIce = document.getElementById("cntIce");
const cntXiaolong = document.getElementById("cntXiaolong");
const cntGhost = document.getElementById("cntGhost");
const cntFood = document.getElementById("cntFood");

// 音频系统：优先 Web Audio API（fetch解码），file://协议自动回退到 new Audio()
let audioCtx = null;
const audioBuf = {};
let bgmSource = null;
let bgmEl = null;          // 回退模式下的BGM Audio元素引用
let soundEnabled = true;
let useAudioFallback = false; // fetch失败时切回 new Audio

// 预解码所有音频
async function decodeAllAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    await audioCtx.resume();
    const entries = [
        ['eat', AUDIO.eat], ['ghost', AUDIO.ghost],
        ['bombBad', AUDIO.bombBad], ['xiaolongSong', AUDIO.xiaolongSong],
        ['bgm', AUDIO.bgm]
    ];
    let failed = false;
    for (const [key, url] of entries) {
        try {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const ab = await resp.arrayBuffer();
            audioBuf[key] = await audioCtx.decodeAudioData(ab);
        } catch(e) {
            failed = true;
        }
    }
    if (failed) {
        useAudioFallback = true;
        // file://协议下fetch不可用，回退到 new Audio
    }
}

// 播放音效
function playSound(type) {
    if (!soundEnabled) return;
    // 回退模式：new Audio（兼容file://协议）
    if (useAudioFallback) {
        try {
            if (type === 'bgm') {
                bgmEl = new Audio(AUDIO.bgm);
                bgmEl.loop = true;
                bgmEl.volume = 0.4;
                bgmEl.play().catch(() => { soundEnabled = false; });
            } else {
                const a = new Audio(AUDIO[type]);
                a.volume = 0.8;
                a.play().catch(() => {});
            }
        } catch(e) { soundEnabled = false; }
        return;
    }
    // Web Audio API 模式
    if (!audioBuf[type]) return;
    try {
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuf[type];
        const gain = audioCtx.createGain();
        gain.gain.value = (type === 'bgm') ? 0.4 : 0.8;
        source.connect(gain);
        gain.connect(audioCtx.destination);
        source.start(0);
        if (type === 'bgm') {
            source.loop = true;
            bgmSource = source;
        }
    } catch(e) { soundEnabled = false; }
}

// 停止BGM
function stopBgm() {
    if (bgmSource) {
        try { bgmSource.stop(); } catch(e) {}
        bgmSource = null;
    }
    if (bgmEl) {
        try { bgmEl.pause(); bgmEl.currentTime = 0; } catch(e) {}
        bgmEl = null;
    }
}

// ===================== 像素级碰撞 ====================
const alphaCache = {};

// 从已加载的 img 对象直接提取透明通道，避免重复创建 Image
function extractAlpha(key, img, mode) {
    mode = mode || 'stretch';
    try {
        const c = document.createElement('canvas');
        c.width = img.naturalWidth; c.height = img.naturalHeight;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const d = ctx.getImageData(0, 0, img.naturalWidth, img.naturalHeight).data;
        const a = new Uint8Array(img.naturalWidth * img.naturalHeight);
        for (let i = 0; i < a.length; i++) a[i] = d[i * 4 + 3];
        alphaCache[key] = { alpha: a, w: img.naturalWidth, h: img.naturalHeight, mode };
    } catch(e) {
        alphaCache[key] = false; // CORS/file:// 退化 AABB
    }
}

// 兼容接口：从 URL 加载再解析（goodsList 图片为外部文件时使用）
function loadAlpha(key, src, mode) {
    return new Promise(resolve => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload  = () => { extractAlpha(key, img, mode); resolve(); };
        img.onerror = () => { alphaCache[key] = false; resolve(); };
        img.src = src;
    });
}

// 批量预加载：图片 + alpha 一轮并行， onload 后立刻解析，减少两阶段串行等待
async function preloadAllAssets() {
    const loadingFill = document.getElementById('loadingFill');
    const loadingPct  = document.getElementById('loadingPct');
    function setProgress(done, total) {
        const pct = total > 0 ? Math.round(done / total * 100) : 0;
        loadingFill.style.width = pct + '%';
        loadingPct.textContent  = pct + '%';
    }

    // 需要解析 alpha 的图片映射表：src -> [{ key, mode }]
    const alphaSrcMap = [
        { key: 'paddle',   src: IMG.paddle,   mode: 'contain' },
        { key: 'bomb',     src: IMG.bomb },
        { key: 'ice',      src: IMG.ice },
        { key: 'xiaolong', src: IMG.xiaolong },
        { key: 'ghost',    src: IMG.ghost },
        { key: 'passive_freeze', src: IMG.freezeSkill },
        { key: 'passive_zhaxiaPass', src: IMG.zhaxiaSkill },
        ...IMG.goodsList.map(g => ({ key: g.alphaKey, src: g.img }))
    ];
    const alphaMap = {};
    alphaSrcMap.forEach(({ key, src, mode }) => {
        if (!alphaMap[src]) alphaMap[src] = [];
        alphaMap[src].push({ key, mode: mode || 'stretch' });
    });

    // 图片去重（base64 去重可规避免重复解码）
    const allImgSrc = [...new Set([
        IMG.gameBg, IMG.startCover,
        IMG.paddle, IMG.paddleGoodFlash, IMG.paddleBombFlash, IMG.paddleIceFlash, IMG.paddleXiaolongFlash, IMG.paddleGhostFlash,
        IMG.endZero, IMG.end142, IMG.end234, IMG.end325, IMG.endQuqu, IMG.endFreeze, IMG.endSacred, IMG.endDragonBall, IMG.end5835, IMG.endHigh, IMG.endFull, IMG.endLow,
        IMG.bomb, IMG.ice, IMG.xiaolong, IMG.ghost, IMG.zhaxiaSkill, IMG.freezeSkill,
        ...IMG.goodsList.map(g => g.img)
    ])];

    // total = 图片渲染 tick + alpha解析 tick
    const total = allImgSrc.reduce((s, src) => s + 1 + (alphaMap[src] ? 1 : 0), 0);
    let done = 0;
    function tick() { done++; setProgress(done, total); }

    await Promise.all(allImgSrc.map(imgSrc => new Promise(res => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
            tick();
            if (alphaMap[imgSrc]) {
                alphaMap[imgSrc].forEach(({ key, mode }) => extractAlpha(key, img, mode));
                tick();
            }
            res();
        };
        img.onerror = () => {
            tick();
            if (alphaMap[imgSrc]) {
                alphaMap[imgSrc].forEach(({ key }) => { alphaCache[key] = false; });
                tick();
            }
            res();
        };
        img.src = imgSrc;
    })));
    // 音频推迟到 startGame 用户手势后创建，此处跳过

    setProgress(total, total);
    loadingMask.classList.add('hide');
    startCoverImg.src = IMG.startCover;
    paddle.style.backgroundImage = `url(${IMG.paddle})`;
    gameWrap.style.backgroundImage = `url(${IMG.gameBg})`;
    startPop.classList.remove('hide');
}

function getAlphaAt(key, elW, elH, px, py) {
    const d = alphaCache[key];
    if (!d) return 0;
    let ix, iy;
    if (d.mode === 'stretch') {
        // 100% 100% 拉伸模式：直接比例映射
        ix = (px / elW) * d.w;
        iy = (py / elH) * d.h;
    } else {
        // contain 模式：居中缩放映射
        const s = Math.min(elW / d.w, elH / d.h);
        const ox = (elW - d.w * s) / 2;
        const oy = (elH - d.h * s) / 2;
        ix = (px - ox) / s;
        iy = (py - oy) / s;
    }
    if (ix < 0 || ix >= d.w || iy < 0 || iy >= d.h) return 0;
    return d.alpha[Math.floor(iy) * d.w + Math.floor(ix)];
}

function pixelCheck(k1, x1, y1, w1, h1, k2, x2, y2, w2, h2) {
    const cache1 = alphaCache[k1];
    const cache2 = alphaCache[k2];
    if (!cache1 || !cache2) {
	 console.warn("⚠️ 缓存缺失导致误判！缺失的 key:", !cache1 ? k1 : k2, "当前所有缓存:", Object.keys(alphaCache));
	return true};

    const oL = Math.max(x1, x2);
    const oR = Math.min(x1 + w1, x2 + w2);
    const oT = Math.max(y1, y2);
    const oB = Math.min(y1 + h1, y2 + h2);
    const step = 2;
    for (let sy = oT; sy < oB; sy += step) {
        for (let sx = oL; sx < oR; sx += step) {
            if (getAlphaAt(k2, w2, h2, sx - x2, sy - y2) <= 20) continue;
            if (getAlphaAt(k1, w1, h1, sx - x1, sy - y1) <= 20) continue;
            return true;
        }
    }
    return false;
}

function loadSave() {
    const data = JSON.parse(JSON.stringify(DEFAULT_SAVE));
    try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return data;
        const saved = JSON.parse(raw);
        if (saved.version !== 1) return data;
        Object.keys(data.endings).forEach(k => {
            if (typeof saved.endings?.[k] === 'number') data.endings[k] = saved.endings[k];
        });
        Object.keys(data.catches).forEach(k => {
            if (typeof saved.catches?.[k] === 'number') data.catches[k] = saved.catches[k];
        });
        if (saved.skills) {
            if (saved.skills.active === null || typeof saved.skills.active === 'string')
                data.skills.active = saved.skills.active;
            if (saved.skills.passive === null || typeof saved.skills.passive === 'string')
                data.skills.passive = saved.skills.passive;
        }
    } catch (e) {}
    return data;
}
function isSkillUnlocked(skillId, data) {
    const def = SKILL_CATALOG[skillId];
    if (!def) return false;
    if (def.defaultUnlocked) return true;
    const save = data || loadSave();
    return (save.endings[def.unlockEnding] || 0) > 0;
}
function getValidatedSkills(data) {
    const save = data || loadSave();
    let active = save.skills?.active || null;
    let passive = save.skills?.passive || null;
    if (active && !isSkillUnlocked(active, save)) active = null;
    if (passive && !isSkillUnlocked(passive, save)) passive = null;
    return { active, passive };
}
function setEquippedSkill(slot, skillId) {
    const data = loadSave();
    if (!data.skills) data.skills = { active: null, passive: null };

function hitTest(item){
	
	const gameRect = gameWrap.getBoundingClientRect();
    const padRect = paddle.getBoundingClientRect();
    const pL = padRect.left - gameRect.left;
    const pR = padRect.right - gameRect.left;
	
	const baseHeight = 100 * scale;
    const currentHeight = padRect.height;
    const heightScaleRatio = currentHeight / baseHeight;
    
    const pT = padRect.top - gameRect.top + Math.round(25 * scale * heightScaleRatio);
    const pB = padRect.bottom - gameRect.top - Math.round(20 * scale * heightScaleRatio);

    const baseWidth = 100 * scale;
    const currentWidth = padRect.width;
    const widthScaleRatio = currentWidth / baseWidth;
    
    const shrink = Math.round(20 * scale * widthScaleRatio);
	
    const iL = item.x + shrink;
    const iR = item.x + item.w - shrink;
    const iT = item.y + shrink;
    const iB = item.y + item.h - shrink;
    if(pR < iL || pL > iR || pB < iT || pT > iB) return false;
    const itemAlphaKey = item.dom.dataset.alphaKey;
    // 用缩进后的有效高度传给 pixelCheck，避免底部多出额外的碰撞区域
    const padEffH = pB - pT;
    return pixelCheck(
        'paddle', pL, pT, padRect.width, padEffH,
        itemAlphaKey, item.x, item.y, item.w, item.h
    );
	
}



function gameLoop(timestamp){
    if(!isPlay || isMenuOpen()) return;
    frameId = requestAnimationFrame(gameLoop);
    
    // 基于时间增量的运动，解耦帧率波动 (Android Chrome 帧率随触摸波动)
    // Skip physics until browser provides a real timestamp
    if (timestamp == null) return;

    if (lastFrameTime === null) {
        lastFrameTime = timestamp;
        return; // sync clock, no movement spike
    }

    const dt = Math.min(timestamp - lastFrameTime, 50);
    lastFrameTime = timestamp;
    const timeScale = dt / 16.667;
    updatePassiveBuffUI();
	
	
	
    for(let i = dropList.length - 1; i >= 0; i--){
        const item = dropList[i];

        if (item.sucking) {
            item.suckT += dt;
            const t = Math.min(item.suckT / item.suckDuration, 1);
            const ease = t * t * t;
            item.x = item.suckStartX + (item.suckTargetX - item.suckStartX) * ease;
            item.y = item.suckStartY + (item.suckTargetY - item.suckStartY) * ease;
            item.dom.style.left = Math.round(item.x) + 'px';
            item.dom.style.top = Math.round(item.y) + 'px';
            const shrink = 1 - ease * 0.35;
            item.dom.style.transform = `scale(${shrink})`;
            if (t >= 1) collectVacuumedFood(i);
            continue;
        }

        if (isPassiveBuffActive() && equippedPassive === 'zhaxiaPass' && item.dom.dataset.type === 'good'
            && item.dom.dataset.alphaKey !== getZhaxiaGood().alphaKey) {
            applyZhaxiaToGoodItem(item);
        }

        item.y += item.speed * getPassiveSpeedMult() * timeScale;
        item.dom.style.top = Math.round(item.y) + "px"; 
        
        if(hitTest(item)){
            const type = item.dom.dataset.type;
            removeItem(i);

            if (type === 'passive_pickup') {
                playSound('eat');
                flashPaddle('good');
                activatePassiveBuff();
                continue;
            }

            flashPaddle(type);

            // 拾取统计计数累加
            if(type === "bomb") statBomb++;
            if(type === "ice") statIce++;
            if(type === "xiaolong") statXiaolong++;
            if(type === "ghost") statGhost++;
            if(type === "good") statFood++;

            // 音效触发逻辑
            if(type === "good"){
                onCatchGood(Number(item.dom.dataset.point));
            }else if(type === "ghost"){
                playSound('ghost');
                // 碰到死鬼生命值+1
                life++;
                lifeBox.innerText = life;
            }else if(type === "bomb"){
                playSound('bombBad');
                life--;
                lifeBox.innerText = life;
                resetCombo();
                if(life <= 0){ gameOver(); return; }
            }else if(type === "ice"){
                catchIceCount++;
                if(catchIceCount >= 15){
                    gameOver();
                    return;
                }
            }else if(type === "xiaolong"){
                playSound('xiaolongSong');
                catchXiaolongCount++;
                if(catchXiaolongCount >= 100){
                    gameOver();
                    return;
                }
            }
            continue;
        }
        
        if(item.y > window.innerHeight + 50){
            const wasFood = item.dom.dataset.type === 'good';
            removeItem(i);
            if(wasFood) resetCombo();
        }
    }
}

function removeItem(index){
    dropList[index].dom.remove();
    dropList.splice(index, 1);
}

function startCreate(){
    createTimer = setInterval(createItem, 850);
}
function stopCreate(){
    if(createTimer) clearInterval(createTimer);
    createTimer = null;
}

function updatePaddleSize() {
    padW = Math.min(100 + Math.floor(score * 0.5), 200) * scale;
    padH = Math.min(100 + Math.floor(score * 0.3), 200) * scale;
    padW = Math.round(padW);
    padH = Math.round(padH);
    paddle.style.width = padW + "px";
    paddle.style.height = padH + "px";
    const maxX = window.innerWidth - padW;
    padX = Math.max(0, Math.min(padX, maxX));
    updatePad();
}

function resetCombo() {
    combo = 0;
    multiplier = 1.0;
    updateComboDisplay();
}

function updateComboDisplay() {
    document.getElementById('comboDisplay').innerText = combo;
    document.getElementById('multDisplay').innerText = multiplier.toFixed(1);
}

function startGame(){
    startBtn.disabled = true;
    restartBtn.disabled = true;
    homeBtn.disabled = true;
    endingsBtn.disabled = true;
    score = 0;
    life = 3;
    dropSpeed = 3 * speedScale;
    catchIceCount = 0;
    catchXiaolongCount = 0;

    // 重置所有拾取统计
    statBomb = 0;
    statIce = 0;
    statXiaolong = 0;
    statGhost = 0;
    statFood = 0;

    isPaused = false;
    document.getElementById('pauseMask').classList.add('hide');
    document.getElementById('pauseBtn').innerHTML='&#9646;&#9646;';
    resetCombo();
    updatePaddleSize();
    scoreBox.innerText = score;
    lifeBox.innerText = life;
    dropList.forEach(i=>i.dom.remove());
    dropList = [];
    paddle.style.backgroundImage = `url(${IMG.paddle})`;
    if(paddleFlashTimer) clearTimeout(paddleFlashTimer);
    paddleFlashTimer = null;
    startPop.classList.add("hide");
    overPop.classList.add("hide");
    endingsPop.classList.add("hide");
    skillsPop.classList.add("hide");
    const skills = getValidatedSkills();
    equippedActive = skills.active;
    equippedPassive = skills.passive;
    activeSkillUsed = false;
    passiveBuffUntil = 0;
    document.getElementById('passiveBuffWrap').classList.add('hide');
    isPlay = true;
    document.getElementById('pauseBtn').style.display='block';
    updateInGameSkillBtn();
    lastFrameTime = null; // 重置帧时间，避免首帧异常dt
    // 在用户手势（点击）后初始化 Web Audio + 解码 + 播BGM
    if (!audioBuf.bgm) {
        decodeAllAudio().then(() => playSound('bgm'));
    } else {
        playSound('bgm');
    }
    gameLoop();
    startCreate();
    setTimeout(()=>{
        startBtn.disabled = false;
        restartBtn.disabled = false;
        homeBtn.disabled = false;
        endingsBtn.disabled = false;
    }, 500);
}

function returnToMain(){
    isPlay = false;
    isPaused = false;
    if(frameId) cancelAnimationFrame(frameId);
    frameId = null;
    stopCreate();
    stopBgm();
    if(paddleFlashTimer) clearTimeout(paddleFlashTimer);
    paddleFlashTimer = null;
    dropList.forEach(i => i.dom.remove());
    dropList = [];
    paddle.style.backgroundImage = `url(${IMG.paddle})`;
    document.getElementById('pauseBtn').style.display = 'none';
    activeSkillBtn.style.display = 'none';
    document.getElementById('passiveBuffWrap').classList.add('hide');
    document.getElementById('pauseMask').classList.add('hide');
    overPop.classList.add('hide');
    endingsPop.classList.add('hide');
    skillsPop.classList.add('hide');
    startPop.classList.remove('hide');
    renderSaveStats(loadSave());
    renderSkillSlots(loadSave());
}



//结局结算
function resolveEndingId(score, catchIceCount, catchXiaolongCount) {
  const ququScores = [15, 123, 300, 400, 700, 777];
  if (score === 5835) return 'end5835';
  if (score >= 999) return 'endFull';
  if (catchIceCount >= 15) return 'endFreeze';
  if (catchXiaolongCount >= 100) return 'endSacred';
  if (score === 7) return 'endDragonBall';
  if (ququScores.includes(score)) return 'endQuqu';
  if (score === 325) return 'end325';
  if (score === 0) return 'endZero';
  if (score === 142) return 'end142';
  if (score === 234) return 'end234';
  if (score >= 318) return 'endHigh';
  return 'endLow';
}




function gameOver(){
    isPlay = false;
    document.getElementById('pauseBtn').style.display='none';
    activeSkillBtn.style.display='none';
    document.getElementById('passiveBuffWrap').classList.add('hide');
    isPaused = false;
    if(frameId) cancelAnimationFrame(frameId);
    frameId = null;
    stopCreate();
    if(paddleFlashTimer) clearTimeout(paddleFlashTimer);
    paddleFlashTimer = null;
    stopBgm();
    finalScore.innerText = score;

    // 填充结算面板数字
    cntBomb.innerText = statBomb;
    cntIce.innerText = statIce;
    cntXiaolong.innerText = statXiaolong;
    cntGhost.innerText = statGhost;
    cntFood.innerText = statFood;
    const endingId = resolveEndingId(score, catchIceCount, catchXiaolongCount);
    resultImg.src = IMG[endingId];
    recordGameResult(endingId, { bomb: statBomb, ice: statIce, xiaolong: statXiaolong, ghost: statGhost, food: statFood });
    overPop.classList.remove("hide");
}

startBtn.onclick = startGame;
restartBtn.onclick = startGame;
homeBtn.onclick = returnToMain;
endingsBtn.onclick = openEndingsGallery;
endingsBackBtn.onclick = closeEndingsGallery;
activeSkillSlot.onclick = () => openSkillPicker('active');
passiveSkillSlot.onclick = () => openSkillPicker('passive');
skillsBackBtn.onclick = closeSkillPicker;
activeSkillBtn.addEventListener('click', useActiveSkill);

window.addEventListener("resize",()=>{
    fixViewportHeight();
    applyScale();
});

// 窗口失去焦点暂停游戏+暂停BGM
// 暂停 / 继续
let isPaused = false;
const pauseBtn  = document.getElementById('pauseBtn');
const pauseMask = document.getElementById('pauseMask');
const resumeBtn = document.getElementById('resumeBtn');

function pauseGame() {
    if (!isPlay || isPaused) return;
    isPaused = true;
    isPlay = false;
    stopCreate();
    if (frameId) cancelAnimationFrame(frameId);
    stopBgm();
    pauseBtn.innerHTML = '&#9654;';
    pauseMask.classList.remove('hide');
}

function resumeGame() {
    if (!isPaused) return;
    isPaused = false;
    isPlay = true;
    lastFrameTime = null;
    pauseMask.classList.add('hide');
    pauseBtn.innerHTML = '&#9646;&#9646;';
    gameLoop();
    startCreate();
    playSound('bgm');
}

pauseBtn.addEventListener('click', () => {
    if (isPaused) resumeGame(); else pauseGame();
});
resumeBtn.addEventListener('click', resumeGame);

// 窗口失焦：未手动暂停时才暂停
window.addEventListener('blur', () => {
    if (!isPlay || isPaused) return;
    pauseGame();
});
// 窗口重聚焦：手动暂停中不自动恢复；菜单页面不触发
window.addEventListener('focus', () => {
    if (isPaused || isMenuOpen()) return;
    if (!isPlay && startPop.classList.contains('hide') && overPop.classList.contains('hide')) {
        isPlay = true;
        lastFrameTime = null;
        gameLoop();
        startCreate();
        playSound('bgm');
    }
});



//结局收集逻辑
function renderEndingsGallery() {
    const data = loadSave();
    const grid = document.getElementById('endingsGrid');
    grid.innerHTML = '';
    ENDING_LIST.forEach(({ id, name }) => {
        const count = data.endings[id] || 0;
        const unlocked = count > 0;
        const card = document.createElement('div');
        card.className = 'ending-card' + (unlocked ? '' : ' locked');
        card.innerHTML =
            `<img src="${IMG[id]}" alt="${name}">` +
            `<p class="ending-name">${name}</p>` +
            (unlocked ? `<p class="ending-count">×${count}</p>` : '<p class="ending-lock">未达成</p>');
        grid.appendChild(card);
    });
}
